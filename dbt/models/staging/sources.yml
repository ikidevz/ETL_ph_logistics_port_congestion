version: 2

sources:
  - name: bronze
    database: logistics_db
    schema: bronze
    description: "Raw ingested data from port event generators and customs feeds. Loaded via PUT + COPY INTO from Python generator scripts."
    loaded_at_field: _loaded_at
    freshness:
      warn_after: { count: 8, period: hour }
      error_after: { count: 24, period: hour }

    tables:
      - name: raw_vessel_calls
        description: >
          AIS-derived vessel port call events with dwell time and anchorage wait hours.
          Generated by scripts/generate_port_events.py. ~2,000 rows covering 6 months
          of simulated vessel activity across 5 Philippine ports. Append-only; never updated.
        columns:
          - name: vessel_imo
            description: "IMO vessel identifier — globally unique 7-digit numeric string prefixed with 'IMO'. Drawn from a fixed pool of 200 vessels shared with raw_shipments for join stability."
          - name: port_code
            description: "PH port code (MICT, BCT, CEBU, DAVAO, SUBIC). Raw value may have mixed case or whitespace — uppercased and trimmed in staging."
          - name: arrival_ts
            description: "Vessel arrival timestamp (TIMESTAMP_NTZ). Anchor for all dwell and congestion calculations."
          - name: berth_ts
            description: "Actual berth assignment timestamp. Difference from arrival_ts is anchorage_wait_h."
          - name: departure_ts
            description: "Vessel departure timestamp. Used to compute dwell_hours when the raw column is null."
          - name: dwell_hours
            description: "Total port dwell in hours (arrival to departure). May be null — coalesced from DATEDIFF in staging."
          - name: anchorage_wait_h
            description: "Hours waiting at anchorage before berth assignment. Primary congestion proxy: values > 24h flag congested calls."
          - name: cargo_type
            description: "Cargo classification: FCL | LCL | RORO | BULK. Raw value uppercased in staging."
          - name: teu_count
            description: "Twenty-foot Equivalent Units handled in this port call. Integer; range 10–2000."
          - name: _loaded_at
            description: "Snowflake COPY INTO load timestamp. Used as the incremental watermark for all downstream fact models."

      - name: raw_shipments
        description: >
          Shipment lifecycle records from ETD through ATA with pre-computed delay hours.
          Generated by scripts/generate_shipments.py. ~10,000 rows. Each row represents
          one bill of lading from an international origin to a Philippine destination port.
          Append-only; used as the primary source for shipment-level analytics.
        columns:
          - name: shipment_id
            description: "UUID primary identifier — generated by faker. Unique per shipment."
            tests:
              - not_null
              - unique
          - name: bl_number
            description: "Bill of Lading number in format BL######. Not guaranteed unique across reruns."
          - name: origin_port
            description: "LOCODE of origin port (e.g. CNSHA, SGSIN, JPOSA, USLAX, NLRTM). Raw LOCODE — uppercased in staging."
          - name: dest_port
            description: "PH destination port code (MICT, BCT, CEBU, DAVAO, SUBIC). Joins to ph_ports seed and dim_port."
          - name: carrier_code
            description: "Carrier SCAC / common name (MAERSK, MSC, EVERGREEN, CMA, OOCL). Uppercased in staging."
          - name: vessel_imo
            description: "IMO of the vessel carrying this shipment. Drawn from same VESSEL_POOL as raw_vessel_calls — enables vessel-level joins."
          - name: etd
            description: "Estimated Time of Departure from origin (TIMESTAMP_NTZ)."
          - name: eta
            description: "Estimated Time of Arrival at Philippine destination (TIMESTAMP_NTZ)."
          - name: ata
            description: "Actual Time of Arrival. 40% of shipments arrive 24–120 hours late. Null = still in transit."
          - name: delay_hours
            description: "Pre-computed delay: MAX(0, ATA - ETA) in hours. Recomputed in staging using GREATEST(0, DATEDIFF) to ensure accuracy."
          - name: cargo_type
            description: "Cargo category: Electronics | Machinery | Textiles | Food | Chemicals. Used to infer incoterm in dim_shipment."
          - name: commodity_code
            description: "HS commodity code (e.g. 8471.30). Joins to ph_tariff_rates seed for duty rate lookup in fct_landed_cost."
          - name: declared_value_usd
            description: "CIF declared value in USD. Base for duty and VAT calculations."
          - name: freight_usd
            description: "Freight cost in USD (8% of declared_value_usd)."
          - name: insurance_usd
            description: "Insurance cost in USD (0.5% of declared_value_usd)."
          - name: _loaded_at
            description: "Snowflake COPY INTO load timestamp. Incremental watermark for fct_shipment_events and fct_landed_cost."

      - name: raw_customs_entries
        description: >
          Philippine Bureau of Customs (BOC) entry records: one entry per shipment covering
          the lodge → assessment → release timeline. Generated by scripts/generate_customs_entries.py
          which reads raw_shipments.csv. ~10,000 rows (1:1 with shipments). Duties computed
          from a randomly selected rate; prod replacement would use the ph_tariff_rates seed lookup.
        columns:
          - name: entry_number
            description: "Customs entry number in format CE####### — unique per entry."
            tests:
              - not_null
              - unique
          - name: shipment_id
            description: "FK to raw_shipments.shipment_id. One-to-one relationship."
          - name: bl_number
            description: "Bill of Lading number — denormalized from raw_shipments for customs workflow context."
          - name: commodity_code
            description: "HS code carried over from raw_shipments. Used in dim_customs_entry for commodity-level analysis."
          - name: entry_type
            description: "BOC entry classification: FORMAL | INFORMAL | WAREHOUSING. Uppercased in staging."
          - name: declared_value_usd
            description: "CIF value (declared_value_usd + freight_usd + insurance_usd from raw_shipments). Duty base per Philippine customs law."
          - name: tariff_rate_pct
            description: "Applied duty rate as a percentage. Randomly assigned (0, 3, 5, 7, 10, 15). In prod, derived from ph_tariff_rates seed."
          - name: duties_usd
            description: "Computed duties in USD: declared_value_usd × tariff_rate_pct / 100."
          - name: vat_usd
            description: "12% VAT in USD applied on CIF + duties per Philippine tax law."
          - name: total_tax_usd
            description: "Sum of duties_usd + vat_usd."
          - name: lodge_date
            description: "Date customs entry was lodged with BOC (0–3 days before ATA)."
          - name: assessment_date
            description: "Date BOC completed duty assessment (1–5 days after lodge)."
          - name: release_date
            description: "Date cargo was physically released from customs (4–72 hours after assessment)."
          - name: processing_days
            description: "Days from lodge_date to release_date — clearance cycle time KPI. May be null; coalesced via DATEDIFF in staging."
          - name: payment_mode
            description: "Duty payment method: CASH | SURETY_BOND | DEFERRED. Uppercased in staging."
          - name: port_code
            description: "Port where customs clearance occurred. Equals raw_shipments.dest_port."
          - name: _loaded_at
            description: "Snowflake COPY INTO load timestamp."
